# Taxonomie de classement — Étape 1 (§4.2, §7.1 du PLAN).
#
# Dérivée de l'arborescence-squelette de PLAN.md §4.2 et de l'analyse des 6 dossiers
# de référence triés par l'expert (arborescence.md, golden set). Chaque catégorie est un
# chemin cible RELATIF à workspace/<dossier_id>/organized/ (on ne reproduit pas le double
# niveau <AAAA>_<TYPE>_<STATUT>/AO<aa>_<COMMUNE>.../ de l'arborescence de l'expert : ce
# niveau-là identifie le DOSSIER lui-même dans son classement documentaire global, pas son
# contenu — un run de l'app traite UN DCE à la fois).
#
# Champs par catégorie :
#   path             : chemin cible (utilisé tel quel comme dossier dans organized/)
#   label            : libellé humain (justifications, UI)
#   alt_names        : autres noms de dossiers observés pour ce même type (signal filename +
#                      matching sur le chemin d'origine dans le zip)
#   filename_keywords: mots-clés / motifs recherchés dans le nom de fichier d'origine (signal 1)
#   content_indices  : mots-clés / expressions recherchées dans le texte extrait (OCR ou natif),
#                      décisif quand le nom de fichier ment (signal 2)
#   lot_aware        : si vrai, un sous-dossier "LOT <n>" est créé quand un numéro de lot est
#                       détecté pour le document (nom de fichier, contenu, ou décision LLM)
#   doc_type_hint    : code court utilisé dans la convention de renommage [TYPE]

categories:
  - path: "1.ETUDE BD"
    label: "Étude BD — AE, mémoire de gestion, déclarations, listing pièces"
    alt_names: ["1.ETUDE BD", "ETUDE BD"]
    filename_keywords: ["\\bae\\b", "acte d.?engagement", "memoire de gestion", "m[ée]moire de gestion",
      "declaration sur l.?honneur", "d[ée]claration sur l.?honneur", "listing pieces", "listing pi[èe]ces"]
    content_indices: ["acte d'engagement", "mémoire de gestion", "déclaration sur l'honneur"]
    lot_aware: true
    doc_type_hint: "AE"

  - path: "ADMIN/AAPC"
    label: "Avis d'appel public à la concurrence"
    alt_names: ["AAPC"]
    filename_keywords: ["\\baapc\\b"]
    content_indices: ["avis d'appel public à la concurrence", "aapc"]
    lot_aware: false
    doc_type_hint: "AAPC"

  - path: "ADMIN/GAN"
