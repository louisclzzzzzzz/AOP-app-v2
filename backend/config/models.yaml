# Modèles Mistral utilisés par AOP v2 — versions épinglées.
# Toute évolution de version se fait ici, jamais en dur dans le code.
# Convention: on épingle une version datée en prod pour la reproductibilité;
# "-latest" reste utilisable en dev pour suivre les dernières améliorations Mistral.

ocr:
  model: "mistral-ocr-2512"
  fallback_latest: "mistral-ocr-latest"
  # Seuil de confiance moyenne par bloc en-dessous duquel un document est marqué "à vérifier"
  min_confidence: 0.70
  # Concurrence max sur la file OCR (upload + /v1/ocr) — indépendante de la file LLM chat,
  # cadencée séparément (§1/§4 OPTIMISATION.md). Valeur prudente par défaut, ajustable.
  max_concurrency: 3

llm:
  # Classification (étape 1), complétude (étape 2), extraction (étape 3)
  model: "mistral-large-2512"
  fallback_latest: "mistral-large-latest"
  # Documents à forte composante image (plans, schémas) : modèle multimodal (Pixtral a été
  # retiré du catalogue Mistral ; mistral-medium est nativement multimodal depuis 2505)
  multimodal_model: "mistral-medium-2604"
  # Température basse partout : on veut de la reproductibilité, pas de créativité
  temperature: 0.0
  max_retries: 3
  timeout_seconds: 120
  # Espacement minimum entre deux appels chat structurés (file LLM mono-worker, §4
  # OPTIMISATION.md) — valeur prudente par défaut, à ajuster selon le palier de rate limit réel.
  min_interval_seconds: 1.0

extraction:
  # Nombre de passes de recoupement pour les champs critiques (montants, dates, garanties)
  cross_check_passes: 2
  # Champs pour lesquels le recoupement multi-documents (RC/CCAP/CCTP) est obligatoire
  cross_check_required_fields:
    - montants_totaux_ht
    - montants_totaux_ttc
    - garanties_demandees
    - date_debut_travaux
    - date_fin_previsionnelle

completeness:
  # Seuil de confiance OCR en-dessous duquel une correspondance passe en "à vérifier"
  min_ocr_confidence_for_certain: 0.80
  # Seuil de confiance LLM en-dessous duquel une correspondance passe en "à vérifier"
  min_llm_confidence_for_certain: 0.75

classification:
  min_confidence_for_auto_apply: 0.60
  # Modèle dédié à la classification batchée (§2 OPTIMISATION.md) : tâche facile, un modèle
  # moins cher suffit et n'entame pas le quota du modèle d'extraction (mistral-large).
  model: "mistral-small-2603"
  fallback_latest: "mistral-small-latest"
  # Nombre de documents ambigus regroupés dans un même appel LLM structuré.
  batch_size: 10

text_extraction:
  # Densité de texte natif (caractères / page) en-dessous de laquelle on déclenche l'OCR de contrôle
  native_text_density_threshold: 200
  # Si la densité moyenne sur tout le document est en-dessous de ce seuil, on considère
  # le PDF comme scanné/plan et on OCRise systématiquement toutes les pages.
  scanned_pdf_density_threshold: 50
  # Expérimental (phase 4 OPTIMISATION.md) : aucun OCR pendant l'ingestion (étapes 1/2), texte
  # natif seul. L'OCR n'a lieu qu'à la demande en étape 3, pour les seuls documents concernés par
  # l'extraction (`ensure_document_ocr`). Repasser à false pour retrouver le comportement validé
  # (OCR upfront sur tout document analysable, resultats_tests_1/).
  defer_ocr_to_extraction: true

feature_flags:
  # Pré-calcul du niveau RCMO/TRC via le tableau Feuil1 de donnees_de_ref.md (§6.3, §12)
  precompute_rcmo_trc: false
